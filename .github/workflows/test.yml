name: Test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: nano_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      # TODO: Fix checksum issue and remove env variable
      #
      # SECURITY: YARN_CHECKSUM_BEHAVIOR=update tells Yarn to silently update
      # mismatched checksums in the lockfile instead of failing. This defeats
      # one of the lockfile's supply-chain integrity guarantees. Resolve the
      # underlying mismatch and remove this override.
      - name: yarn install
        run: |
          YARN_CHECKSUM_BEHAVIOR=update yarn install
          cd cli
          YARN_CHECKSUM_BEHAVIOR=update yarn install
          cd ..

      - name: yarn lint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn lint

      - name: yarn test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn test
