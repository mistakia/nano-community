name: Test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    services:
      # Tests connect via config.test.js (production_postgres: client pg, user
      # postgres, db nano_test, 127.0.0.1:5432) and load db/schema.postgres.sql,
      # which requires the TimescaleDB extension. The TSL image preloads it so
      # the schema's CREATE EXTENSION timescaledb + create_hypertable() succeed.
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: nano_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: yarn install
        run: |
          yarn install --immutable
          cd cli
          yarn install --immutable
          cd ..

      - name: yarn lint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn lint

      - name: yarn test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn test
