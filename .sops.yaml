# sops/age recipient policy for nano-community config secrets.
#
# config.production.json holds this site's production secrets, encrypted to this
# single host's age recipient (nano.community VPS, .104). The private identity
# lives only on that host at ~/.config/sops/age/keys.txt; this file records only
# the PUBLIC recipient, which is safe to commit. To re-encrypt after editing:
# `sops config.production.json` (sops reads this policy for the recipient set).
#
# nano-community is a single-host domain — one recipient. Adding a host = add its
# public recipient here and `sops updatekeys config.production.json`.
creation_rules:
  - path_regex: config\.production\.json$
    age: age1q22xdnajanceptca57llluzyg7xzvjayr60y9j44xfyzvvc9495qg5g2sp
